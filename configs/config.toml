[assistant]
name = "Mind"
description = "A lightweight local-first personal AI assistant."

[paths]
workspace = "workspace"
database = "data/mind.db"

[model]
provider = "ollama"
base_url = "http://localhost:11434"
default = "gemma4:e4b"

[memory]
auto_memory = true
max_relevant_memories = 8

[context]
max_workspace_chars = 12000
